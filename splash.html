<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DyeMind AI — Splash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  *{box-sizing:border-box;margin:0;padding:0;}

  :root{
    --blue:#1a56db;
    --teal:#0f766e;
    --blue-light:#3b82f6;
    --teal-light:#14b8a6;
  }

  body{
    background:#0b1e4a;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-family:'DM Sans',sans-serif;
  }

  /* Animated mesh background */
  .bg-mesh{
    position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(26,86,219,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(15,118,110,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(59,130,246,0.06) 0%, transparent 70%),
      #0b1e4a;
    animation: meshPulse 6s ease-in-out infinite alternate;
  }
  @keyframes meshPulse{
    from{opacity:1;}
    to{opacity:0.7;}
  }

  /* Dot grid overlay */
  .dot-grid{
    position:fixed;inset:0;z-index:1;
    background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* Floating particles */
  .particles{position:fixed;inset:0;z-index:2;pointer-events:none;}
  .particle{
    position:absolute;
    border-radius:50%;
    animation: floatUp linear infinite;
    opacity:0;
  }
  @keyframes floatUp{
    0%{opacity:0;transform:translateY(0) scale(0.5);}
    10%{opacity:0.6;}
    90%{opacity:0.3;}
    100%{opacity:0;transform:translateY(-100vh) scale(1.2);}
  }

  /* Main container */
  .splash{
    position:relative;z-index:10;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;
    padding:40px 32px;
    animation: splashIn 1s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes splashIn{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* Flask icon */
  .flask-wrap{
    position:relative;
    margin-bottom:36px;
    animation: floatIcon 4s ease-in-out infinite;
  }
  @keyframes floatIcon{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
  }

  .flask-glow{
    position:absolute;
    inset:-24px;
    border-radius:50%;
    background:radial-gradient(ellipse, rgba(26,86,219,0.3) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite alternate;
    z-index:-1;
  }
  @keyframes glowPulse{
    from{opacity:0.5;transform:scale(0.9);}
    to{opacity:1;transform:scale(1.1);}
  }

  /* Wordmark */
  .wordmark{
    font-family:'DM Serif Display',serif;
    font-size: clamp(2.8rem, 10vw, 4.2rem);
    font-weight:400;
    letter-spacing:-0.02em;
    line-height:1;
    margin-bottom:6px;
    background:linear-gradient(110deg, #60a5fa, #1a56db 35%, #0f766e 65%, #2dd4bf);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    animation: shimmerText 4s ease-in-out infinite alternate;
    background-size:200% 100%;
  }
  @keyframes shimmerText{
    from{background-position:0% 50%;}
    to{background-position:100% 50%;}
  }

  .wordmark-ai{
    display:inline-block;
    font-family:'DM Sans',sans-serif;
    font-size:clamp(0.9rem,3vw,1.2rem);
    font-weight:600;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.5);
    margin-bottom:28px;
  }

  /* Tagline */
  .tagline{
    font-size:clamp(0.78rem,2.5vw,0.92rem);
    color:rgba(255,255,255,0.42);
    letter-spacing:0.22em;
    text-transform:uppercase;
    font-weight:400;
    margin-bottom:52px;
    line-height:1.8;
  }
  .tagline span{
    display:inline-block;
    padding:0 10px;
    opacity:0;
    animation: fadeWord 0.6s ease both;
  }
  .tagline span:nth-child(1){animation-delay:0.8s;}
  .tagline span:nth-child(2){animation-delay:1.1s;}
  .tagline span:nth-child(3){animation-delay:1.4s;}
  .tagline span:nth-child(4){animation-delay:1.7s;}
  @keyframes fadeWord{
    from{opacity:0;transform:translateY(6px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* Loader */
  .loader-wrap{
    display:flex;flex-direction:column;align-items:center;gap:14px;
    opacity:0;
    animation: fadeIn 0.5s ease 2s both;
  }
  @keyframes fadeIn{
    from{opacity:0;}to{opacity:1;}
  }

  .loader-track{
    width:180px;height:3px;
    background:rgba(255,255,255,0.08);
    border-radius:2px;
    overflow:hidden;
  }
  .loader-fill{
    height:100%;
    background:linear-gradient(90deg,#1a56db,#0f766e,#14b8a6);
    border-radius:2px;
    animation:loadFill 2.5s cubic-bezier(0.4,0,0.2,1) 2.1s both;
    width:0%;
  }
  @keyframes loadFill{
    0%{width:0%;}
    30%{width:35%;}
    60%{width:68%;}
    80%{width:82%;}
    100%{width:100%;}
  }

  .loader-lbl{
    font-size:0.65rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.28);
    font-weight:500;
  }

  /* Version badge */
  .version{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%);
    font-size:0.65rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.18);
    z-index:20;
    opacity:0;
    animation: fadeIn 0.5s ease 2.5s both;
  }

  /* Dye colour strip at bottom */
  .colour-strip{
    position:fixed;
    bottom:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg,
      #f43f5e 0%,
      #f59e0b 20%,
      #22c55e 40%,
      #1a56db 60%,
      #0f766e 80%,
      #a78bfa 100%
    );
    z-index:20;
    opacity:0.6;
  }
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="dot-grid"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Colour strip -->
<div class="colour-strip"></div>

<!-- Main splash content -->
<div class="splash">

  <!-- Flask SVG icon -->
  <div class="flask-wrap">
    <div class="flask-glow"></div>
    <svg width="110" height="140" viewBox="0 0 110 140" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1a56db"/>
          <stop offset="100%" stop-color="#0f766e"/>
        </linearGradient>
        <linearGradient id="lq" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.65"/>
          <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.65"/>
        </linearGradient>
        <linearGradient id="sh" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
        </linearGradient>
        <filter id="dg" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="fc">
          <path d="M38 40 L38 62 L12 96 Q5 110 5 118 Q5 135 22 135 L88 135 Q105 135 105 118 Q105 110 98 96 L72 62 L72 40 Z"/>
        </clipPath>
        <!-- Atom for top -->
        <filter id="ag" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Neck cap -->
      <rect x="30" y="30" width="50" height="12" rx="6" fill="url(#fg)"/>
      <!-- Flask body -->
      <path d="M38 40 L38 62 L12 96 Q5 110 5 118 Q5 135 22 135 L88 135 Q105 135 105 118 Q105 110 98 96 L72 62 L72 40 Z"
            fill="none" stroke="url(#fg)" stroke-width="4" stroke-linejoin="round"/>
      <!-- Liquid -->
      <g clip-path="url(#fc)">
        <rect x="0" y="98" width="115" height="45" fill="url(#lq)"/>
        <path d="M0 100 Q25 92 45 100 Q65 108 85 100 Q100 94 115 100 L115 145 L0 145 Z" fill="url(#lq)" opacity="0.55"/>
        <path d="M38 40 L38 62 L12 96 Q5 110 5 118 Q5 135 22 135 L55 135 L55 40 Z" fill="url(#sh)"/>
      </g>
      <!-- Dye dots -->
      <g filter="url(#dg)">
        <circle cx="30" cy="116" r="6" fill="#f43f5e" opacity="0.95"/>
        <circle cx="46" cy="126" r="5" fill="#f59e0b" opacity="0.95"/>
        <circle cx="62" cy="114" r="6" fill="#22c55e" opacity="0.95"/>
        <circle cx="76" cy="125" r="5" fill="#38bdf8" opacity="0.95"/>
        <circle cx="90" cy="115" r="5.5" fill="#a78bfa" opacity="0.95"/>
      </g>
      <!-- Atom spinner above flask -->
      <g filter="url(#ag)" transform="translate(55,14)">
        <circle cx="0" cy="0" r="4" fill="url(#fg)"/>
        <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#1a56db" stroke-width="1.5" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#0f766e" stroke-width="1.2" opacity="0.7" transform="rotate(60)"/>
        <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5" transform="rotate(120)"/>
        <circle cx="14" cy="0" r="2.5" fill="#60a5fa"/>
        <circle cx="-7" cy="-12" r="2" fill="#2dd4bf"/>
        <circle cx="-7" cy="12" r="2" fill="#818cf8"/>
      </g>
    </svg>
  </div>

  <!-- Name -->
  <div class="wordmark">DyeMind</div>
  <div class="wordmark-ai">AI</div>

  <!-- Tagline words -->
  <div class="tagline">
    <span>Colour</span>
    <span>·</span>
    <span>Chemistry</span>
    <span>· Intelligence</span>
  </div>

  <!-- Loading bar -->
  <div class="loader-wrap">
    <div class="loader-track">
      <div class="loader-fill"></div>
    </div>
    <div class="loader-lbl">Initialising Dyeing Brain…</div>
  </div>

</div>

<!-- Version -->
<div class="version">DyeMind AI v1.0 &nbsp;·&nbsp; Abdul Malek</div>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  const colors = ['#f43f5e','#f59e0b','#22c55e','#38bdf8','#a78bfa','#1a56db','#14b8a6'];
  for(let i = 0; i < 22; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 8 + 3;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100+100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      opacity:0;
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*6}s;
    `;
    container.appendChild(p);
  }
</script>
  <script>
setTimeout(() => {
  window.location.href = "/dyemind-ai/index.html";
}, 3000);
  </script>
</body>
        </html>
